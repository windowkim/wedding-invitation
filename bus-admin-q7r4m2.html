<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="robots" content="noindex,nofollow,noarchive" />
    <title>버스 신청 관리자 페이지</title>
    <style>
      :root {
        --bg: #f8f6f4;
        --card: rgba(255, 255, 255, 0.86);
        --accent: #f2b8b5;
        --accent-strong: #e8a09c;
        --secondary: #b5a8b9;
        --text-main: #4e4550;
        --text-muted: rgba(78, 69, 80, 0.72);
        --border: rgba(181, 168, 185, 0.22);
        --shadow: 0 20px 48px rgba(118, 104, 115, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: 'Noto Sans KR', system-ui, sans-serif;
        background:
          radial-gradient(circle at top, rgba(242, 184, 181, 0.24), transparent 34%),
          linear-gradient(180deg, #faf8f6 0%, #f4eef2 100%);
        color: var(--text-main);
      }

      .page {
        width: min(100%, 860px);
        margin: 0 auto;
        padding: 28px 16px 48px;
      }

      .panel {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 24px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(14px);
      }

      .hero {
        padding: 24px 22px;
      }

      .eyebrow {
        margin: 0 0 10px;
        color: var(--accent-strong);
        letter-spacing: 0.24em;
        font-size: 0.82rem;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.7rem, 5vw, 2.2rem);
      }

      .subcopy {
        margin: 12px 0 0;
        color: var(--text-muted);
        line-height: 1.7;
        white-space: pre-line;
      }

      .toolbar {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 18px;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 46px;
        padding: 0 16px;
        border-radius: 999px;
        border: 1px solid transparent;
        background: var(--accent);
        color: #5a4344;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      .button.secondary {
        background: rgba(255, 255, 255, 0.74);
        border-color: var(--border);
        color: var(--text-main);
      }

      .status {
        margin-top: 14px;
        color: var(--text-muted);
      }

      .grid {
        display: grid;
        gap: 14px;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        margin-top: 18px;
      }

      .stat-card {
        padding: 18px;
      }

      .stat-card h2 {
        margin: 10px 0 0;
        font-size: clamp(1.5rem, 5vw, 2rem);
      }

      .stat-card p {
        margin: 0;
        color: var(--text-muted);
      }

      .lists {
        display: grid;
        gap: 14px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        margin-top: 18px;
      }

      .list-card,
      .table-card {
        padding: 20px;
      }

      .list-card h3,
      .table-card h3 {
        margin: 0 0 12px;
        font-size: 1.1rem;
      }

      .name-list {
        margin: 0;
        padding-left: 18px;
        color: var(--text-main);
        line-height: 1.8;
      }

      .name-list li + li {
        margin-top: 4px;
      }

      .table-card {
        margin-top: 18px;
        overflow: hidden;
      }

      .table-wrap {
        overflow-x: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 700px;
      }

      th,
      td {
        padding: 12px 10px;
        border-bottom: 1px solid rgba(181, 168, 185, 0.16);
        text-align: left;
        font-size: 0.95rem;
        white-space: nowrap;
      }

      th {
        color: var(--accent-strong);
        font-weight: 700;
      }

      tbody tr:last-child td {
        border-bottom: 0;
      }

      .empty,
      .warning {
        margin-top: 16px;
        color: var(--text-muted);
        line-height: 1.7;
      }

      .warning {
        padding: 16px 18px;
        background: rgba(255, 255, 255, 0.74);
        border: 1px dashed rgba(181, 168, 185, 0.34);
        border-radius: 18px;
      }

      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 0.92em;
      }

      @media (max-width: 720px) {
        .grid,
        .lists {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="panel hero">
        <p class="eyebrow">Bus Admin</p>
        <h1>버스 신청 관리자 페이지</h1>
        <p class="subcopy" id="introCopy">
          이 페이지는 전체 URL에 포함된 비밀키가 맞을 때만 버스 신청 정보를 보여줍니다.
          주소 끝에 <code>#k=비밀키</code> 형태가 있어야 합니다.
        </p>
        <div class="toolbar">
          <button class="button" id="refreshButton" type="button">새로고침</button>
          <button class="button secondary" id="copyUrlButton" type="button">현재 URL 복사</button>
        </div>
        <p class="status" id="statusText">불러오는 중...</p>
      </section>

      <section class="grid" id="statsGrid" hidden>
        <article class="panel stat-card">
          <p>포항 → 인천 총 탑승 인원</p>
          <h2 id="outboundTotal">0명</h2>
        </article>
        <article class="panel stat-card">
          <p>인천 → 포항 총 탑승 인원</p>
          <h2 id="returnTotal">0명</h2>
        </article>
        <article class="panel stat-card">
          <p>총 신청 건수</p>
          <h2 id="submissionTotal">0건</h2>
        </article>
      </section>

      <section class="lists" id="listsGrid" hidden>
        <article class="panel list-card">
          <h3>포항 → 인천 탑승자</h3>
          <ol class="name-list" id="outboundNames"></ol>
          <p class="empty" id="outboundEmpty" hidden>아직 신청자가 없습니다.</p>
        </article>
        <article class="panel list-card">
          <h3>인천 → 포항 탑승자</h3>
          <ol class="name-list" id="returnNames"></ol>
          <p class="empty" id="returnEmpty" hidden>아직 신청자가 없습니다.</p>
        </article>
      </section>

      <section class="panel table-card" id="tableCard" hidden>
        <h3>신청자 목록</h3>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>신청일시</th>
                <th>구분</th>
                <th>이름</th>
                <th>연락처</th>
                <th>포항 → 인천</th>
                <th>인천 → 포항</th>
                <th>총 합계</th>
              </tr>
            </thead>
            <tbody id="adminTableBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script>
      const ADMIN_CONFIG = {
        supabaseUrl: 'https://lugeiktjewlcspivjwrd.supabase.co',
        publishableKey: 'sb_publishable_7AdmCwZIrpK6Q4S1vGZtYA_AzA2P4vF',
        viewName: 'bus_admin_view',
      };

      const state = {
        rows: [],
      };

      function getAdminKey() {
        const hash = window.location.hash.startsWith('#') ? window.location.hash.slice(1) : window.location.hash;
        return new URLSearchParams(hash).get('k') || '';
      }

      function formatDate(value) {
        if (!value) return '-';
        return new Date(value).toLocaleString('ko-KR');
      }

      function setStatus(message) {
        document.getElementById('statusText').textContent = message;
      }

      function updateNameList(elementId, emptyId, names) {
        const list = document.getElementById(elementId);
        const empty = document.getElementById(emptyId);

        if (!names.length) {
          list.innerHTML = '';
          empty.hidden = false;
          return;
        }

        empty.hidden = true;
        list.innerHTML = names.map((name) => `<li>${name}</li>`).join('');
      }

      function renderAdminData() {
        const rows = state.rows;
        const statsGrid = document.getElementById('statsGrid');
        const listsGrid = document.getElementById('listsGrid');
        const tableCard = document.getElementById('tableCard');
        const tableBody = document.getElementById('adminTableBody');

        const outboundRows = rows.filter((row) => row.outbound_bus === '탑승');
        const returnRows = rows.filter((row) => row.return_bus === '탑승');

        const outboundTotal = outboundRows.reduce((sum, row) => sum + Number(row.outbound_guest_count || 0), 0);
        const returnTotal = returnRows.reduce((sum, row) => sum + Number(row.return_guest_count || 0), 0);

        document.getElementById('outboundTotal').textContent = `${outboundTotal}명`;
        document.getElementById('returnTotal').textContent = `${returnTotal}명`;
        document.getElementById('submissionTotal').textContent = `${rows.length}건`;

        updateNameList(
          'outboundNames',
          'outboundEmpty',
          outboundRows.map((row) => `${row.name} (${row.outbound_guest_count}명)`),
        );
        updateNameList(
          'returnNames',
          'returnEmpty',
          returnRows.map((row) => `${row.name} (${row.return_guest_count}명)`),
        );

        tableBody.innerHTML = rows
          .map((row) => {
            const outboundText = row.outbound_bus === '탑승' ? `${row.outbound_guest_count}명` : '미탑승';
            const returnText = row.return_bus === '탑승' ? `${row.return_guest_count}명` : '미탑승';

            return `
              <tr>
                <td>${formatDate(row.created_at)}</td>
                <td>${row.side || '-'}</td>
                <td>${row.name || '-'}</td>
                <td>${row.phone || '-'}</td>
                <td>${outboundText}</td>
                <td>${returnText}</td>
                <td>${row.requested_total || 0}명</td>
              </tr>
            `;
          })
          .join('');

        statsGrid.hidden = false;
        listsGrid.hidden = false;
        tableCard.hidden = false;
      }

      async function loadAdminData() {
        const adminKey = getAdminKey();

        if (!adminKey) {
          setStatus('비밀키가 없습니다. URL 끝에 #k=비밀키 를 붙여 주세요.');
          return;
        }

        const endpoint = `${ADMIN_CONFIG.supabaseUrl}/rest/v1/${ADMIN_CONFIG.viewName}?select=created_at,side,name,phone,outbound_bus,outbound_guest_count,return_bus,return_guest_count,requested_total&order=created_at.desc`;

        try {
          setStatus('버스 신청 정보를 불러오는 중입니다...');

          const response = await fetch(endpoint, {
            method: 'GET',
            headers: {
              apikey: ADMIN_CONFIG.publishableKey,
              Authorization: `Bearer ${ADMIN_CONFIG.publishableKey}`,
              'x-bus-admin-key': adminKey,
            },
          });

          if (!response.ok) {
            const errorText = await response.text();
            throw new Error(errorText || '관리자 데이터를 불러오지 못했습니다.');
          }

          state.rows = await response.json();
          renderAdminData();
          setStatus(`총 ${state.rows.length}건의 신청 정보를 불러왔습니다.`);
        } catch (error) {
          setStatus('불러오기에 실패했습니다. 비밀키 또는 Supabase 정책 설정을 확인해 주세요.');
          console.error(error);
        }
      }

      async function copyCurrentUrl() {
        try {
          await navigator.clipboard.writeText(window.location.href);
          setStatus('현재 관리자 URL을 복사했습니다.');
        } catch (error) {
          setStatus('URL 복사에 실패했습니다. 주소창에서 직접 복사해 주세요.');
        }
      }

      document.getElementById('refreshButton').addEventListener('click', loadAdminData);
      document.getElementById('copyUrlButton').addEventListener('click', copyCurrentUrl);

      loadAdminData();
    </script>
  </body>
</html>
